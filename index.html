<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moonlight Christmas - Fixed Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pyidaungsu', sans-serif; background: #010409; color: white; overflow-x: hidden; margin: 0; min-height: 100vh; }
        
        /* Dangling Lights */
        .light-strand { 
            position: fixed; top: -10px; left: 0; width: 100%; height: 60px; 
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="50" xmlns="http://www.w3.org/2000/svg"><path d="M0 10 Q 25 40 50 10 T 100 10" stroke="white" stroke-opacity="0.1" fill="transparent"/></svg>');
            background-repeat: repeat-x; z-index: 100; pointer-events: none; 
        }
        .bulb-container { position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-around; z-index: 101; pointer-events: none; }
        .bulb { width: 10px; height: 14px; border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; animation: blink 1.5s infinite alternate; }
        
        @keyframes blink { 
            from { opacity: 0.4; filter: brightness(0.7) drop-shadow(0 0 1px currentColor); } 
            to { opacity: 1; filter: brightness(1.3) drop-shadow(0 0 10px currentColor); } 
        }

        /* Glowing Moon */
        #moon { 
            position: absolute; top: 40px; right: 40px; width: 60px; height: 60px; 
            background: #fff; border-radius: 50%; z-index: 5; 
            box-shadow: 0 0 30px 5px rgba(255, 255, 255, 0.4);
            animation: moon-glow 4s infinite alternate;
        }
        @keyframes moon-glow { from { transform: scale(1); } to { transform: scale(1.08); } }

        /* Moving Stars */
        .star { position: absolute; border-radius: 50%; pointer-events: none; animation: move-star linear infinite; }
        @keyframes move-star { from { transform: translateY(0); } to { transform: translateY(-100vh); } }

        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gift-card { border-radius: 40px; padding: 40px 20px; }
        
        .neon-text { color: #ff0055; text-shadow: 0 0 10px #ff0055; font-weight: 900; }
        
        /* Modal Style */
        .modal-overlay { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body>

    <div class="light-strand"></div>
    <div class="bulb-container" id="bulb-box"></div>
    <div id="moon"></div>
    <div id="star-field"></div>

    <main class="relative z-20 max-w-2xl mx-auto px-6 pt-20 pb-20 text-center">
        <div class="mb-4">
            <span class="neon-text text-xl uppercase italic tracking-widest">M89 ပရိုမိုကုဒ်</span>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-10">
            <img id="img1-disp" src="" class="h-40 w-full object-cover rounded-[2.5rem] shadow-2xl bg-slate-900">
            <img id="img2-disp" src="" class="h-40 w-full object-cover rounded-[2.5rem] shadow-2xl bg-slate-900">
        </div>

        <h1 id="title-disp" class="text-4xl font-black mb-4 italic tracking-tighter">Connecting...</h1>
        <div id="sub-disp" class="text-slate-400 text-base mb-12 leading-relaxed px-4"></div>

        <div class="glass gift-card max-w-sm mx-auto shadow-2xl">
            <div id="draw-zone">
                <button id="draw-btn" onclick="handleDraw()" class="w-full py-6 bg-[#d90429] hover:bg-[#ef233c] text-white rounded-3xl font-black text-2xl shadow-xl active:scale-95 transition-all">
                    Gift Code ရယူရန်နှိပ်ပါ !
                </button>
            </div>

            <div id="result-zone" class="hidden">
                <p class="text-white/40 text-[10px] font-bold tracking-[0.4em] mb-4 uppercase">မင်းရဲ့ ဘောနပ်ကုဒ် !🎁</p>
                <div id="code-disp" class="text-4xl font-black mb-8 tracking-[0.1em] text-white" style="text-shadow: 0 0 15px white;">-----</div>
                <button onclick="copyCode()" class="w-full py-4 bg-white text-black rounded-2xl font-black text-sm uppercase tracking-widest mb-4">ကော်ပီ ကူးယူပါ !</button>
                <a id="game-link-btn" href="#" target="_blank" class="block w-full py-4 border border-white/20 text-white rounded-2xl font-bold text-sm uppercase tracking-widest hover:bg-white/10">
                    ဂိမ်းအကောက်ဖွင့်ရန်နှိပ် !
                </a>
            </div>
            
            <p class="mt-10 text-[10px] opacity-20 tracking-[0.5em] uppercase font-bold">ဂိမ်းအကောင့်ဝင်ပြီး အသုံးပြုပါ။</p>
        </div>
    </main>

    <!-- Settings Gear -->
    <button onclick="toggleLogin()" class="fixed bottom-6 left-6 p-4 bg-white/5 rounded-full z-50 opacity-20 hover:opacity-100 transition-opacity">⚙️</button>

    <!-- Login Modal -->
    <div id="login-modal" class="fixed inset-0 z-[2000] modal-overlay hidden flex items-center justify-center p-6">
        <div class="bg-white text-slate-900 p-8 rounded-[2.5rem] w-full max-w-xs text-center shadow-2xl">
            <h3 class="font-black text-xl mb-6 uppercase">Admin Access</h3>
            <input type="password" id="pin-input" class="w-full p-4 bg-slate-100 rounded-xl mb-6 text-center text-2xl tracking-[0.4em]" placeholder="****">
            <div class="flex gap-2">
                <button onclick="toggleLogin()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold">Back</button>
                <button onclick="checkLogin()" class="flex-1 py-3 bg-black text-white rounded-xl font-bold">Entry</button>
            </div>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-dash" class="fixed inset-0 z-[3000] bg-slate-50 text-slate-900 hidden overflow-y-auto p-6">
        <div class="max-w-xl mx-auto pb-20">
            <div class="flex justify-between items-center mb-8 pt-4">
                <h1 class="text-2xl font-black italic uppercase">Control Panel</h1>
                <button onclick="closeDash()" class="px-5 py-2 bg-white border rounded-xl font-bold shadow-sm">CLOSE</button>
            </div>

            <div class="space-y-6">
                <!-- Text Settings -->
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                    <label class="block text-[10px] font-bold uppercase text-slate-400 mb-2">Title & Subtitle</label>
                    <input id="in-title" type="text" class="w-full p-4 bg-slate-50 rounded-xl mb-3 border border-slate-100" placeholder="Title">
                    <input id="in-color" type="color" class="w-full h-10 rounded-lg mb-3 cursor-pointer">
                    <textarea id="in-sub" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100" rows="2" placeholder="Subtitle (*text* for Bold)"></textarea>
                </div>

                <!-- Game Link -->
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                    <label class="block text-[10px] font-bold uppercase text-slate-400 mb-2">Game Registration Link</label>
                    <input id="in-game-link" type="text" class="w-full p-4 bg-slate-50 rounded-xl border border-slate-100" placeholder="https://...">
                </div>

                <!-- Banner Uploads with Auto-Compression -->
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                    <label class="block text-[10px] font-bold uppercase text-slate-400 mb-2">Banners (Auto-Compressed)</label>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <input type="file" accept="image/*" onchange="processImage(this, 'pre1')" class="text-[8px] w-full">
                            <img id="pre1" class="h-28 w-full object-cover rounded-xl border bg-slate-50">
                        </div>
                        <div class="space-y-2">
                            <input type="file" accept="image/*" onchange="processImage(this, 'pre2')" class="text-[8px] w-full">
                            <img id="pre2" class="h-28 w-full object-cover rounded-xl border bg-slate-50">
                        </div>
                    </div>
                </div>

                <!-- Gift Codes -->
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                    <label class="block text-[10px] font-bold uppercase text-slate-400 mb-2">Gift Codes (One per line)</label>
                    <textarea id="in-codes" class="w-full p-4 bg-slate-50 rounded-xl font-mono text-xs border border-slate-100" rows="5"></textarea>
                </div>

                <button onclick="saveToCloud()" id="save-btn" class="w-full py-5 bg-black text-white rounded-[1.5rem] font-black text-lg active:scale-95 transition-transform shadow-xl">
                    SAVE TO CLOUD
                </button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-green-500 text-white px-8 py-3 rounded-full font-bold hidden z-[5000] shadow-2xl">SUCCESS!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ပုံထဲက နောက်ဆုံး Config ကို အသုံးပြုထားပါတယ်
        const firebaseConfig = {
            apiKey: "AIzaSyDdoLASpM-r6i6iZOwwe1eE0fS4B4z6_n4",
            authDomain: "moonlight-xmaz-28e10.firebaseapp.com",
            projectId: "moonlight-xmaz-28e10",
            storageBucket: "moonlight-xmaz-28e10.firebasestorage.app",
            appId: "1:1042314863578:web:f2b20c89aa8b374f29d6e3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "moonlight_pro", "main_config");
        let appData = {};

        // Realtime Listener
        onSnapshot(docRef, (snap) => {
            if (snap.exists()) {
                appData = snap.data();
                syncUI();
            } else {
                // Initial Default Data
                setDoc(docRef, {
                    title: "Moonlight Xmas",
                    titleColor: "#ffffff",
                    sub: "ပျော်ရွှင်စရာ *Christmas* အခါသမယလေး ဖြစ်ပါစေ။",
                    codes: ["GIFT-CODE-2024"],
                    img1: "https://images.unsplash.com/photo-1543589077-47d81606c1bf?w=400",
                    img2: "https://images.unsplash.com/photo-1512389142860-9c449e58a543?w=400",
                    gameLink: "https://m89.com"
                });
            }
        });

        function syncUI() {
            document.getElementById('title-disp').innerText = appData.title;
            document.getElementById('title-disp').style.color = appData.titleColor;
            document.getElementById('sub-disp').innerHTML = appData.sub.replace(/\*(.*?)\*/g, "<b>$1</b>");
            document.getElementById('img1-disp').src = appData.img1;
            document.getElementById('img2-disp').src = appData.img2;
            document.getElementById('game-link-btn').href = appData.gameLink;

            // Admin Fields
            document.getElementById('in-title').value = appData.title;
            document.getElementById('in-color').value = appData.titleColor;
            document.getElementById('in-sub').value = appData.sub;
            document.getElementById('in-game-link').value = appData.gameLink;
            document.getElementById('in-codes').value = appData.codes.join('\n');
            document.getElementById('pre1').src = appData.img1;
            document.getElementById('pre2').src = appData.img2;
        }

        window.handleDraw = async () => {
            if (!appData.codes?.length) return alert("လက်ဆောင် ကုဒ်များ ကုန်သွားပါပြီ။");
            const codes = [...appData.codes];
            const win = codes.pop();
            document.getElementById('code-disp').innerText = win;
            document.getElementById('draw-zone').classList.add('hidden');
            document.getElementById('result-zone').classList.remove('hidden');
            await setDoc(docRef, { ...appData, codes: codes });
        };

        window.saveToCloud = async () => {
            const btn = document.getElementById('save-btn');
            btn.innerText = "UPDATING..."; btn.disabled = true;
            try {
                const updated = {
                    ...appData,
                    title: document.getElementById('in-title').value,
                    titleColor: document.getElementById('in-color').value,
                    sub: document.getElementById('in-sub').value,
                    gameLink: document.getElementById('in-game-link').value,
                    codes: document.getElementById('in-codes').value.split('\n').filter(c => c.trim()),
                    img1: document.getElementById('pre1').src,
                    img2: document.getElementById('pre2').src
                };
                await setDoc(docRef, updated);
                showToast("Cloud Synced!");
                closeDash();
            } catch (e) { 
                alert("Error: " + e.message + "\n\nTip: Try smaller images."); 
            }
            finally { btn.innerText = "SAVE TO CLOUD"; btn.disabled = false; }
        };
    </script>

    <script>
        // Photo Compression Logic - Crucial for 1MB Limit
        window.processImage = (input, preId) => {
            if (input.files?.[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const MAX = 500; // Limit to 500px for safety
                        if(w > MAX) { h *= MAX/w; w = MAX; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        // Save as high-compressed JPEG
                        document.getElementById(preId).src = canvas.toDataURL('image/jpeg', 0.5);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        function initUI() {
            // Stars
            const field = document.getElementById('star-field');
            for(let i=0; i<50; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 2 + 1 + 'px';
                s.style.width = size; s.style.height = size;
                s.style.background = Math.random() > 0.7 ? '#ffea00' : '#ffffff';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.top = Math.random() * 100 + 'vh';
                s.style.animationDuration = Math.random() * 30 + 20 + 's';
                field.appendChild(s);
            }
            // Bulbs
            const box = document.getElementById('bulb-box');
            const colors = ['#ff0000', '#00ff00', '#0099ff', '#ffcc00', '#ff00ff'];
            for(let i=0; i<15; i++) {
                const b = document.createElement('div');
                b.className = 'bulb';
                b.style.background = colors[i % colors.length];
                b.style.color = colors[i % colors.length];
                b.style.animationDelay = (i * 0.15) + 's';
                b.style.marginTop = (Math.sin(i) * 10 + 15) + 'px';
                box.appendChild(b);
            }
        }

        window.copyCode = () => {
            const txt = document.getElementById('code-disp').innerText;
            const el = document.createElement('textarea');
            el.value = txt; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            showToast("Copied!");
        };

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2000);
        };

        window.toggleLogin = () => document.getElementById('login-modal').classList.toggle('hidden');
        window.checkLogin = () => {
            if(document.getElementById('pin-input').value === "2006") {
                toggleLogin(); document.getElementById('admin-dash').classList.remove('hidden');
                document.getElementById('pin-input').value = "";
            } else alert("PIN မှားယွင်းနေပါသည်။");
        };
        window.closeDash = () => document.getElementById('admin-dash').classList.add('hidden');

        window.onload = initUI;
    </script>
</body>
</html>
